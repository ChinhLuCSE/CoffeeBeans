services:
  mysql:
    image: mysql:8.4
    container_name: coffeebeans-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "YourStrong!Passw0rd"
      MYSQL_DATABASE: "CoffeeBeansDb"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -pYourStrong!Passw0rd || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./coffeebeans-backend
      dockerfile: Dockerfile
    container_name: coffeebeans-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AppDb: "server=mysql;port=3306;database=CoffeeBeansDb;user=root;password=YourStrong!Passw0rd;"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./coffeebeans-frontend
      dockerfile: Dockerfile
    container_name: coffeebeans-frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    ports:
      - "3000:3000"

volumes:
  mysql_data:
